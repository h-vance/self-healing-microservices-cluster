mongodb:
  replicaCount: 1
  image: mongo:7.0
  port: 27017
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

mongoExpress:
  replicaCount: 1
  image: mongo-express:1.0.2
  port: 8081
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

secrets:
  mongoRootUsername: root
  mongoRootPassword: demo-password-change-me
